name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l cmd/xiaomi-onvif internal/xiaomi pkg/xiaomi/miss)"
      - name: Build all packages
        run: go build ./...
      - name: Test modified components
        run: go test ./cmd/xiaomi-onvif ./internal/xiaomi ./pkg/xiaomi/miss
      - name: Race tests
        run: go test -race ./cmd/xiaomi-onvif ./internal/xiaomi ./pkg/xiaomi/miss
      - name: Vet modified components
        run: go vet ./cmd/xiaomi-onvif ./internal/xiaomi ./pkg/xiaomi/miss
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Vulnerability scan
        run: govulncheck ./cmd/xiaomi-onvif ./internal/xiaomi ./pkg/xiaomi/miss
      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          go build -trimpath -o /tmp/go2rtc .
          go build -trimpath -o /tmp/xiaomi-onvif ./cmd/xiaomi-onvif
          /tmp/xiaomi-onvif -version

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          tags: xiaomi-onvif:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
